<!DOCTYPE html>

<html>
<head>

<title>Fee Records</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1>Bal Sakha Play School</h1>

<h3>Fee Records</h3>

<table class="table table-bordered">

<tr>

<th>Student ID</th>
<th>Student Name</th>
<th>Month</th>
<th>Amount</th>
<th>Status</th>
<th>Payment</th>
<th>Receipt</th>

</tr>

{% for f in fees %}

<tr>

<td>{{ f.student_id }}</td>

<td>{{ f.student_name }}</td>

<td>{{ f.month }}</td>

<td>₹{{ f.amount }}</td>

<td>{{ f.status }}</td>

<td>{{ f.status }}</td>

<td>
    <a href="/payfee/{{ f.id }}"
       class="btn btn-success btn-sm">
       Mark Paid
    </a>
</td>

<td>
    <a href="/receipt/{{ f.id }}"
       class="btn btn-primary btn-sm">
       View Receipt
    </a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
