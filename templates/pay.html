<!DOCTYPE html>
<html>
<head>

<title>Pay Fees</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
<div class="container">

<a class="navbar-brand" href="/">
Bal Sakha Play School
</a>

<div>

<a href="/" class="btn btn-light btn-sm">Home</a>

<a href="/admission" class="btn btn-light btn-sm">
Admission
</a>

<a href="/parent" class="btn btn-light btn-sm">
Parent Portal
</a>

<a href="/login" class="btn btn-light btn-sm">
Admin Login
</a>

<a href="/students" class="btn btn-light btn-sm">
Students
</a>

<a href="/fees" class="btn btn-light btn-sm">
Fees
</a>

</div>

</div>
</nav>

<div class="container mt-5">

<h1>Fee Payment</h1>

<p>
<strong>Student:</strong>
{{ student.student_name }}
</p>

<p>
<strong>Student ID:</strong>
{{ student.student_id }}
</p>

<table class="table table-bordered">

<tr>

<th>Month</th>
<th>Amount</th>
<th>Status</th>

</tr>

{% for fee in fees %}

<tr>

<td>{{ fee.month }}</td>

<td>₹{{ fee.amount }}</td>

<td>{{ fee.status }}</td>

</tr>

{% endfor %}

</table>

<button class="btn btn-success">
Pay Online
</button>

</div>

</body>
</html>
