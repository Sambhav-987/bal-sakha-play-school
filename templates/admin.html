<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
<div class="container">

<a class="navbar-brand" href="/">
Bal Sakha Play School
</a>

<div>

<a href="/" class="btn btn-light btn-sm">Home</a>

<a href="/admission" class="btn btn-light btn-sm">
Admission
</a>

<a href="/parent" class="btn btn-light btn-sm">
Parent Portal
</a>

<a href="/login" class="btn btn-light btn-sm">
Admin Login
</a>

<a href="/students" class="btn btn-light btn-sm">
Students
</a>

<a href="/fees" class="btn btn-light btn-sm">
Fees
</a>

</div>

</div>
</nav>

<div class="container mt-5">

<h1>Bal Sakha Play School</h1>

<h3>Admission Records</h3>

<table class="table table-bordered">

<tr>
    <th>ID</th>
    <th>Student</th>
    <th>Father</th>
    <th>Phone</th>
    <th>Class</th>
    <th>Action</th>
</tr>
{% for a in admissions %}

<tr>

<td>{{ a.id }}</td>

<td>{{ a.student_name }}</td>

<td>{{ a.father_name }}</td>

<td>{{ a.phone }}</td>

<td>{{ a.student_class }}</td>

<td>
    <a href="/approve/{{ a.id }}"
       class="btn btn-success btn-sm">
       Approve
    </a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
