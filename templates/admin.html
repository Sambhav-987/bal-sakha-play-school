<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1>Bal Sakha Play School</h1>

<h3>Admission Records</h3>

<table class="table table-bordered">

<tr>
    <th>ID</th>
    <th>Student</th>
    <th>Father</th>
    <th>Phone</th>
    <th>Class</th>
</tr>

{% for a in admissions %}

<tr>

<td>{{ a.id }}</td>

<td>{{ a.student_name }}</td>

<td>{{ a.father_name }}</td>

<td>{{ a.phone }}</td>

<td>{{ a.student_class }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
