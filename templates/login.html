<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
<div class="container">

<a class="navbar-brand" href="/">
Bal Sakha Play School
</a>

<div class="d-flex gap-2">

<a href="/" class="btn btn-light btn-sm">Home</a>

<a href="/admission" class="btn btn-light btn-sm">
Admission
</a>

<a href="/parent" class="btn btn-light btn-sm">
Parent Portal
</a>

<a href="/login" class="btn btn-light btn-sm">
Admin Login
</a>

<a href="/students" class="btn btn-light btn-sm">
Students
</a>

<a href="/fees" class="btn btn-light btn-sm">
Fees
</a>

</div>

</div>
</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-body">

<h2 class="text-center mb-4">
Admin Login
</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">
Username
</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Password
</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button
type="submit"
class="btn btn-success w-100">

Login

</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
