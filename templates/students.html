<!DOCTYPE html>
<html>
<head>

<title>Students</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1>Bal Sakha Play School</h1>

<h3>Students</h3>

<table class="table table-bordered">

<tr>
    <th>Student ID</th>
    <th>Name</th>
    <th>Father</th>
    <th>Phone</th>
    <th>Class</th>
    <th>Monthly Fee</th>
</tr>

{% for s in students %}

<tr>

<td>{{ s.student_id }}</td>

<td>{{ s.student_name }}</td>

<td>{{ s.father_name }}</td>

<td>{{ s.phone }}</td>

<td>{{ s.student_class }}</td>

<td>₹{{ s.monthly_fee }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
