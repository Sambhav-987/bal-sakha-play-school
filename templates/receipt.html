<!DOCTYPE html>

<html>
<head>

<title>Fee Receipt</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
<div class="container">

<a class="navbar-brand" href="/">
Bal Sakha Play School
</a>

<div>

<a href="/" class="btn btn-light btn-sm">Home</a>

<a href="/admission" class="btn btn-light btn-sm">
Admission
</a>

<a href="/parent" class="btn btn-light btn-sm">
Parent Portal
</a>

<a href="/login" class="btn btn-light btn-sm">
Admin Login
</a>

<a href="/students" class="btn btn-light btn-sm">
Students
</a>

<a href="/fees" class="btn btn-light btn-sm">
Fees
</a>

</div>

</div>
</nav>

<div class="container mt-5">

<div class="card p-4">

<h1 class="text-center">Bal Sakha Play School</h1>

<h3 class="text-center">Fee Receipt</h3>

<hr>

<p><strong>Student ID:</strong> {{ fee.student_id }}</p>

<p><strong>Student Name:</strong> {{ fee.student_name }}</p>

<p><strong>Month:</strong> {{ fee.month }}</p>

<p><strong>Amount Paid:</strong> ₹{{ fee.amount }}</p>

<p><strong>Status:</strong> {{ fee.status }}</p>

<hr>

<h5 class="text-center">
Thank You For Your Payment
</h5>

</div>

</div>

</body>
</html>
